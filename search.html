<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Allyoulike Comic - Pencarian Manga</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        /* ========= GLOBAL & RESET ========= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #111; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ========= HEADER (TANPA SEARCH APAPUN) ========= */
        .main-header { 
            background: #0a0a0a; 
            border-bottom: 3px solid #ffa74e; 
            border-radius: 0 0 12px 12px; 
            padding: 10px 20px; 
            margin-bottom: 30px;
        }
        .top-bar { display: flex; justify-content: flex-start; align-items: center; width: 100%; }
        
        /* LOGO AREA */
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; flex-shrink: 0; }
        .logo-icon { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #ffa74e;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .logo-icon:hover {
            transform: scale(1.05);
            border-color: #ff5e7c;
        }
        .logo-text { 
            font-size: 24px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #ffa74e, #ff5e7c, #ffa74e);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient 3s ease infinite;
            letter-spacing: 1px;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .logo-sub { 
            font-size: 10px; 
            color: #aaa; 
            margin-top: 2px;
        }
        .logo-sub i {
            font-size: 10px;
            margin-right: 4px;
            color: #ffa74e;
        }
        
        /* NAV MENU */
        .nav-menu { display: flex; gap: 25px; justify-content: center; padding: 15px 0 5px; flex-wrap: wrap; }
        .nav-menu a { color: #ddd; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
        .nav-menu a:hover { color: #ffa74e; }
        
        /* ========= SEARCH AREA UTAMA ========= */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            text-align: center;
            padding: 0 10px;
        }
        
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        
        .search-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 12px 55px 12px 20px;
            font-size: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #ffa74e;
            box-shadow: 0 0 8px rgba(255, 167, 78, 0.2);
        }
        
        .search-input::placeholder {
            color: #888;
        }
        
        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #ffa74e;
            cursor: pointer;
            font-size: 18px;
            padding: 8px 12px;
            transition: all 0.2s;
        }
        
        .search-button:hover {
            color: #ff8c2e;
            transform: translateY(-50%) scale(1.05);
        }
        
        /* INFO BAR (HASIL PENCARIAN + CLEAR BUTTON) */
        .search-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 30px;
            border-left: 4px solid #ffa74e;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .result-count {
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .result-count i {
            color: #ffa74e;
            font-size: 16px;
        }
        
        .clear-search-btn {
            background: #2a2a2a;
            color: #ffa74e;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .clear-search-btn:hover {
            background: #ffa74e;
            color: #111;
            transform: scale(1.02);
        }
        
        /* ========= PAGINATION ========= */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .pagination-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            min-width: 40px;
            text-align: center;
        }
        
        .pagination-btn:hover {
            color: #ffa74e;
            transform: translateY(-1px);
        }
        
        .pagination-btn.active {
            color: #ffa74e;
            font-weight: bold;
        }
        
        .pagination-arrow {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: bold;
        }
        
        .pagination-arrow:hover {
            color: #ffa74e;
            transform: translateY(-1px);
        }
        
        .pagination-arrow.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .pagination-dots {
            color: #888;
            padding: 8px 4px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        /* ========= GRID KOMIK ========= */
        .comic-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
            margin-bottom: 40px;
            padding: 0 10px;
        }
        
        @media (max-width: 600px) { 
            .comic-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } 
        }
        
        /* CARD KOMIK */
        .comic-item {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        
        .comic-item:hover {
            transform: translateY(-5px);
            border-color: #ffa74e;
        }
        
        .thumb-box {
            aspect-ratio: 2/3;
            overflow: hidden;
            background: #222;
        }
        
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s;
        }
        
        .comic-item:hover .thumb-box img {
            transform: scale(1.02);
        }
        
        .comic-title {
            display: block;
            padding: 10px 8px;
            text-align: center;
            color: #eee;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0,0,0,0.4);
        }
        
        .comic-title:hover {
            color: #ffa74e;
            text-decoration: none;
        }
        
        /* ========= EMPTY STATE ========= */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            margin: 40px auto;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 500px;
            width: 90%;
            background: transparent;
            border: none;
        }
        
        #resultGrid:has(.empty-state) {
            display: block;
        }
        
        .empty-icon {
            font-size: clamp(60px, 15vw, 100px);
            margin-bottom: 24px;
            display: inline-block;
            animation: gentleFloat 3s ease-in-out infinite;
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .empty-icon i {
            background: linear-gradient(135deg, #ffa74e, #ff5e7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .empty-title {
            font-size: clamp(20px, 6vw, 28px);
            font-weight: 700;
            margin-bottom: 0;
            color: #fff;
            line-height: 1.3;
            padding: 0 15px;
        }
        
        /* ========= FOOTER FULL WIDTH ========= */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid #222;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        .footer-text {
            color: #777;
            font-size: 13px;
        }
        .footer-text i {
            color: #ff5e7c;
            margin: 0 2px;
        }
        
        /* ========= CONTENT WRAPPER (biar konten tetap di tengah) ========= */
        .content-wrapper {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }
        
        /* ========= RESPONSIVE ========= */
        @media (max-width: 768px) {
            .logo-icon { width: 40px; height: 40px; }
            .logo-text { font-size: 20px; }
            .nav-menu { gap: 15px; }
            .nav-menu a { font-size: 12px; }
            .empty-state {
                padding: 40px 15px;
                min-height: 300px;
                margin: 30px auto;
                max-width: 450px;
            }
            .search-info-bar {
                flex-direction: column;
                text-align: center;
                margin-left: 10px;
                margin-right: 10px;
            }
            .result-count {
                justify-content: center;
            }
            .search-container {
                max-width: 90%;
            }
            .pagination-btn, .pagination-arrow {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 34px;
            }
            .content-wrapper {
                padding: 0 15px;
            }
        }
        
        @media (max-width: 480px) {
            .logo-text { font-size: 18px; }
            .logo-sub { font-size: 8px; }
            .logo-icon { width: 36px; height: 36px; }
            .nav-menu { gap: 10px; }
            .nav-menu a { font-size: 11px; }
            .empty-state {
                padding: 30px 12px;
                min-height: 250px;
                max-width: 95%;
                margin: 20px auto;
            }
            .search-container {
                margin-bottom: 25px;
            }
            .search-input {
                padding: 10px 50px 10px 18px;
                font-size: 13px;
            }
            .search-button {
                font-size: 16px;
            }
            .pagination-btn, .pagination-arrow {
                padding: 5px 8px;
                font-size: 11px;
                min-width: 30px;
            }
            .pagination-dots {
                padding: 5px 2px;
                font-size: 11px;
            }
            .content-wrapper {
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>

<!-- ========= HEADER (TANPA SEARCH APAPUN) ========= -->
<div class="main-header">
    <div class="top-bar">
        <div class="logo-area" id="logoClick">
            <img src="https://i.ibb.co.com/11BD9mL/38ce5f186788fbab817dc04d9ccc14e4.jpg" 
                 alt="Allyoulike Comic Logo" 
                 class="logo-icon"
                 onerror="this.onerror=null; this.src='https://placehold.co/48x48?text=AC'">
            <div>
                <div class="logo-text">Allyoulike Comic</div>
                <div class="logo-sub"><i class="fa-regular fa-images"></i> Gallery Comic Center</div>
            </div>
        </div>
    </div>
    
    <div class="nav-menu">
        <a href="#" id="navHome"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#" id="navRandom"><i class="fa-solid fa-shuffle"></i> Random</a>
        <a href="#" id="navVideo"><i class="fa-solid fa-film"></i> Video</a>
        <a href="https://www.google.com" id="navVideo34" target="_blank"><i class="fa-solid fa-video"></i> Video 34</a>
    </div>
</div>

<!-- ========= KONTEN UTAMA (dibungkus wrapper biar konten di tengah, footer full) ========= -->
<div class="content-wrapper">
    
    <!-- SEARCH BOX UTAMA -->
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="mainSearchInput" class="search-input" placeholder="Search comics, manga, title..." autocomplete="off">
            <button id="mainSearchBtn" class="search-button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>
    
    <!-- INFO BAR: HASIL PENCARIAN + CLEAR SEARCH BUTTON -->
    <div id="searchInfoBar" class="search-info-bar" style="display: none;">
        <div class="result-count" id="resultCount">
            <i class="fa-regular fa-magnifying-glass"></i>
            <span id="resultCountText">Search results for "" - Found 0 comics</span>
        </div>
        <button id="clearSearchBtn" class="clear-search-btn">
            <i class="fa-solid fa-times"></i> Clear Search
        </button>
    </div>
    
    <!-- GRID HASIL PENCARIAN -->
    <div id="resultGrid" class="comic-grid"></div>
    
    <!-- PAGINATION -->
    <div id="pagination" class="pagination-container"></div>
</div>

<!-- ========= FOOTER FULL WIDTH ========= -->
<footer class="main-footer">
    <div class="footer-text">
        © 2025 Allyoulike Comic - Gallery Comic Center. All rights reserved. | Designed with <i class="fa-solid fa-heart"></i> for comic lovers
    </div>
</footer>

<script>
    // ========= KONFIGURASI =========
    const DATA_URL = "https://allyoulikecomic.neocities.org/p/daftar.json";
    const BASE_URL = "https://allyoulikecomic.neocities.org/p/";
    const HOME_URL = "https://allyoulikecomic.neocities.org/";
    const VIDEO_URL = "https://www.youtube.com";
    const ITEMS_PER_PAGE = 30;
    const PAGE_KEY = 'search_current_page';
    
    let allComics = [];
    let currentQuery = "";
    let currentPageNum = 1;
    let currentFilteredResults = [];
    
    // ========= FUNGSI NAVIGASI =========
    function getRandomComic() {
        if (!allComics.length) return;
        const randomIndex = Math.floor(Math.random() * allComics.length);
        const randomItem = allComics[randomIndex];
        const link = randomItem.link.startsWith('http') ? randomItem.link : BASE_URL + randomItem.link;
        window.location.href = link;
    }
    
    function goHome() {
        window.location.href = HOME_URL;
    }
    
    function openVideo() {
        window.open(VIDEO_URL, '_blank');
    }
    
    // ========= AMBIL DATA DARI JSON =========
    async function loadData() {
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            allComics = data.pages || [];
            
            console.log('Data loaded successfully. Total comics:', allComics.length);
            
            if (allComics.length === 0) {
                showEmptyState('no-data', 'No comics found in database');
                return;
            }
            
            // Cek parameter URL untuk pencarian
            const urlParams = new URLSearchParams(window.location.search);
            const queryParam = urlParams.get('q');
            
            if (queryParam && queryParam.trim() !== "") {
                const searchInput = document.getElementById('mainSearchInput');
                if (searchInput) searchInput.value = queryParam;
                performSearch(queryParam);
            } else {
                // Tampilkan semua komik
                currentFilteredResults = [...allComics];
                renderPaginatedGrid();
                const infoBar = document.getElementById('searchInfoBar');
                if (infoBar) infoBar.style.display = 'none';
            }
            
        } catch (err) {
            console.error('Error loading data:', err);
            showEmptyState('error', `Failed to load data: ${err.message}`);
        }
    }
    
    // ========= RENDER GRID DENGAN PAGINATION =========
    function renderPaginatedGrid() {
        const start = (currentPageNum - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const paginatedData = currentFilteredResults.slice(start, end);
        
        renderGrid(paginatedData);
        renderPagination(currentPageNum, currentFilteredResults.length);
    }
    
    function renderGrid(comics) {
        const grid = document.getElementById('resultGrid');
        if (!grid) return;
        
        if (!comics || comics.length === 0) {
            showEmptyState('no-results', `No comics found with title "${escapeHtml(currentQuery)}"`);
            return;
        }
        
        grid.style.display = 'grid';
        
        grid.innerHTML = comics.map(comic => {
            const link = comic.link.startsWith('http') ? comic.link : BASE_URL + comic.link;
            const imgUrl = comic.image || "https://placehold.co/400x600?text=No+Image";
            const title = comic.title || "Untitled";
            
            return `
                <div class="comic-item">
                    <a href="${link}" style="text-decoration: none;">
                        <div class="thumb-box">
                            <img src="${imgUrl}" alt="${escapeHtml(title)}" loading="lazy" 
                                 onerror="this.src='https://placehold.co/400x600?text=Error'">
                        </div>
                        <div class="comic-title">${escapeHtml(title)}</div>
                    </a>
                </div>
            `;
        }).join('');
    }
    
    // ========= PAGINATION =========
    function renderPagination(currentPage, totalItems) {
        const container = document.getElementById('pagination');
        if (!container) return;
        container.innerHTML = "";
        
        const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
        if (totalPages <= 1) return;
        
        const firstBtn = document.createElement('button');
        firstBtn.innerHTML = '<<';
        firstBtn.className = 'pagination-arrow';
        if (currentPage === 1) firstBtn.classList.add('disabled');
        firstBtn.onclick = () => { if (currentPage > 1) goToPage(1); };
        container.appendChild(firstBtn);
        
        const prevBtn = document.createElement('button');
        prevBtn.innerHTML = '<';
        prevBtn.className = 'pagination-arrow';
        if (currentPage === 1) prevBtn.classList.add('disabled');
        prevBtn.onclick = () => { if (currentPage > 1) goToPage(currentPage - 1); };
        container.appendChild(prevBtn);
        
        let startPage, endPage;
        const maxVisible = 5;
        
        if (totalPages <= maxVisible + 2) {
            startPage = 1;
            endPage = totalPages;
        } else {
            if (currentPage <= 3) {
                startPage = 1;
                endPage = maxVisible;
            } else if (currentPage >= totalPages - 2) {
                startPage = totalPages - maxVisible + 1;
                endPage = totalPages;
            } else {
                startPage = currentPage - 2;
                endPage = currentPage + 2;
            }
        }
        
        for (let i = startPage; i <= endPage; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.innerText = i;
            pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
            pageBtn.onclick = () => goToPage(i);
            container.appendChild(pageBtn);
        }
        
        if (endPage < totalPages - 1) {
            const dots = document.createElement('span');
            dots.innerText = '...';
            dots.className = 'pagination-dots';
            container.appendChild(dots);
        }
        
        if (endPage < totalPages) {
            const lastBtn = document.createElement('button');
            lastBtn.innerText = totalPages;
            lastBtn.className = `pagination-btn ${totalPages === currentPage ? 'active' : ''}`;
            lastBtn.onclick = () => goToPage(totalPages);
            container.appendChild(lastBtn);
        }
        
        const nextBtn = document.createElement('button');
        nextBtn.innerHTML = '>';
        nextBtn.className = 'pagination-arrow';
        if (currentPage === totalPages) nextBtn.classList.add('disabled');
        nextBtn.onclick = () => { if (currentPage < totalPages) goToPage(currentPage + 1); };
        container.appendChild(nextBtn);
        
        const lastBtnLast = document.createElement('button');
        lastBtnLast.innerHTML = '>>';
        lastBtnLast.className = 'pagination-arrow';
        if (currentPage === totalPages) lastBtnLast.classList.add('disabled');
        lastBtnLast.onclick = () => { if (currentPage < totalPages) goToPage(totalPages); };
        container.appendChild(lastBtnLast);
    }
    
    function goToPage(page) {
        currentPageNum = page;
        renderPaginatedGrid();
        saveCurrentPage(page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // ========= SAVE & LOAD PAGE =========
    function saveCurrentPage(page) {
        localStorage.setItem(PAGE_KEY, page.toString());
    }
    
    function getLastPage() {
        const savedPage = localStorage.getItem(PAGE_KEY);
        if (savedPage && !isNaN(parseInt(savedPage))) {
            return parseInt(savedPage);
        }
        return 1;
    }
    
    // ========= UPDATE INFO BAR =========
    function updateInfoBar(resultCount) {
        const infoBar = document.getElementById('searchInfoBar');
        const resultCountText = document.getElementById('resultCountText');
        
        if (!infoBar || !resultCountText) return;
        
        if (currentQuery && currentQuery.trim() !== "") {
            infoBar.style.display = 'flex';
            resultCountText.innerHTML = `Search results for "${escapeHtml(currentQuery)}" - Found ${resultCount} comic${resultCount !== 1 ? 's' : ''}`;
        } else {
            infoBar.style.display = 'none';
        }
    }
    
    // ========= TAMPILAN EMPTY STATE =========
    function showEmptyState(type, message) {
        const grid = document.getElementById('resultGrid');
        const pagination = document.getElementById('pagination');
        if (!grid) return;
        
        if (pagination) pagination.innerHTML = '';
        grid.style.display = 'block';
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <i class="fa-regular fa-face-frown"></i>
                </div>
                <div class="empty-title">${escapeHtml(message)}</div>
            </div>
        `;
    }
    
    // ========= CLEAR SEARCH =========
    function clearSearch() {
        currentQuery = "";
        currentPageNum = 1;
        currentFilteredResults = [...allComics];
        
        const mainSearchInput = document.getElementById('mainSearchInput');
        
        if (mainSearchInput) mainSearchInput.value = "";
        
        const infoBar = document.getElementById('searchInfoBar');
        if (infoBar) infoBar.style.display = 'none';
        
        renderPaginatedGrid();
        
        const newUrl = window.location.pathname;
        window.history.pushState({}, '', newUrl);
        saveCurrentPage(1);
    }
    
    // ========= FUNGSI PENCARIAN =========
    function performSearch(query) {
        const searchTerm = query.trim().toLowerCase();
        currentQuery = searchTerm;
        currentPageNum = 1;
        
        if (!searchTerm) {
            clearSearch();
            return;
        }
        
        currentFilteredResults = allComics.filter(comic => {
            const title = (comic.title || "").toLowerCase();
            return title.includes(searchTerm);
        });
        
        renderPaginatedGrid();
        updateInfoBar(currentFilteredResults.length);
        
        const newUrl = `${window.location.pathname}?q=${encodeURIComponent(searchTerm)}`;
        window.history.pushState({ search: searchTerm }, '', newUrl);
        saveCurrentPage(1);
    }
    
    // ========= UTILITY =========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========= EVENT HANDLERS =========
    function initEventListeners() {
        const mainSearchInput = document.getElementById('mainSearchInput');
        const mainSearchBtn = document.getElementById('mainSearchBtn');
        
        if (mainSearchBtn) {
            mainSearchBtn.onclick = () => {
                const val = mainSearchInput ? mainSearchInput.value : '';
                performSearch(val);
            };
        }
        
        if (mainSearchInput) {
            mainSearchInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    const val = mainSearchInput.value;
                    performSearch(val);
                }
            };
        }
        
        const clearBtn = document.getElementById('clearSearchBtn');
        if (clearBtn) {
            clearBtn.onclick = () => {
                clearSearch();
            };
        }
    }
    
    // ========= NAVIGASI MENU =========
    function initNavigation() {
        const homeBtn = document.getElementById('navHome');
        const randomBtn = document.getElementById('navRandom');
        const videoBtn = document.getElementById('navVideo');
        const logo = document.getElementById('logoClick');
        
        if (homeBtn) homeBtn.onclick = (e) => { e.preventDefault(); goHome(); };
        if (randomBtn) randomBtn.onclick = (e) => { e.preventDefault(); getRandomComic(); };
        if (videoBtn) videoBtn.onclick = (e) => { e.preventDefault(); openVideo(); };
        if (logo) logo.onclick = () => { goHome(); };
    }
    
    // ========= POPSTATE =========
    window.addEventListener('popstate', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        const mainSearchInput = document.getElementById('mainSearchInput');
        
        if (q && q.trim()) {
            if (mainSearchInput) mainSearchInput.value = q;
            performSearch(q);
        } else {
            clearSearch();
        }
    });
    
    // ========= INIT =========
    document.addEventListener("DOMContentLoaded", () => {
        loadData();
        initNavigation();
        initEventListeners();
    });
</script>
</body>
</html>
