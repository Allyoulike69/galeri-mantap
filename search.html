<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Allyoulike Comic - Pencarian Manga</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        /* ========= SISA CSS YANG TIDAK TERMASUK HEADER ========= */
        /* SEARCH AREA UTAMA */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            text-align: center;
            padding: 0 10px;
        }
        
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        
        .search-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 12px 55px 12px 20px;
            font-size: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #ffa74e;
            box-shadow: 0 0 8px rgba(255, 167, 78, 0.2);
        }
        
        .search-input::placeholder {
            color: #888;
        }
        
        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #ffa74e;
            cursor: pointer;
            font-size: 18px;
            padding: 8px 12px;
            transition: all 0.2s;
        }
        
        .search-button:hover {
            color: #ff8c2e;
            transform: translateY(-50%) scale(1.05);
        }
        
        /* INFO BAR (HASIL PENCARIAN + CLEAR BUTTON) */
        .search-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 30px;
            border-left: 4px solid #ffa74e;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .result-count {
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .result-count i {
            color: #ffa74e;
            font-size: 16px;
        }
        
        .clear-search-btn {
            background: #2a2a2a;
            color: #ffa74e;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .clear-search-btn:hover {
            background: #ffa74e;
            color: #111;
            transform: scale(1.02);
        }
        
        /* PAGINATION */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .pagination-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            min-width: 40px;
            text-align: center;
        }
        
        .pagination-btn:hover {
            color: #ffa74e;
            transform: translateY(-1px);
        }
        
        .pagination-btn.active {
            color: #ffa74e;
            font-weight: bold;
        }
        
        .pagination-arrow {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: bold;
        }
        
        .pagination-arrow:hover {
            color: #ffa74e;
            transform: translateY(-1px);
        }
        
        .pagination-arrow.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .pagination-dots {
            color: #888;
            padding: 8px 4px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        /* GRID KOMIK */
        .comic-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
            margin-bottom: 40px;
            padding: 0 10px;
        }
        
        @media (max-width: 600px) { 
            .comic-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } 
        }
        
        /* CARD KOMIK */
        .comic-item {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        
        .comic-item:hover {
            transform: translateY(-5px);
            border-color: #ffa74e;
        }
        
        .thumb-box {
            aspect-ratio: 2/3;
            overflow: hidden;
            background: #222;
        }
        
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s;
        }
        
        .comic-item:hover .thumb-box img {
            transform: scale(1.02);
        }
        
        .comic-title {
            display: block;
            padding: 10px 8px;
            text-align: center;
            color: #eee;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0,0,0,0.4);
        }
        
        .comic-title:hover {
            color: #ffa74e;
            text-decoration: none;
        }
        
        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            margin: 40px auto;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 500px;
            width: 90%;
            background: transparent;
            border: none;
        }
        
        #resultGrid:has(.empty-state) {
            display: block;
        }
        
        .empty-icon {
            font-size: clamp(60px, 15vw, 100px);
            margin-bottom: 24px;
            display: inline-block;
            animation: gentleFloat 3s ease-in-out infinite;
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .empty-icon i {
            background: linear-gradient(135deg, #ffa74e, #ff5e7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .empty-title {
            font-size: clamp(20px, 6vw, 28px);
            font-weight: 700;
            margin-bottom: 0;
            color: #fff;
            line-height: 1.3;
            padding: 0 15px;
        }
        
        /* FOOTER FULL WIDTH */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid #222;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        .footer-text {
            color: #777;
            font-size: 13px;
        }
        .footer-text i {
            color: #ff5e7c;
            margin: 0 2px;
        }
        
        /* CONTENT WRAPPER (biar konten tetap di tengah) */
        .content-wrapper {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .logo-icon { width: 40px; height: 40px; }
            .logo-text { font-size: 20px; }
            .nav-menu { gap: 15px; }
            .nav-menu a { font-size: 12px; }
            .empty-state {
                padding: 40px 15px;
                min-height: 300px;
                margin: 30px auto;
                max-width: 450px;
            }
            .search-info-bar {
                flex-direction: column;
                text-align: center;
                margin-left: 10px;
                margin-right: 10px;
            }
            .result-count {
                justify-content: center;
            }
            .search-container {
                max-width: 90%;
            }
            .pagination-btn, .pagination-arrow {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 34px;
            }
            .content-wrapper {
                padding: 0 15px;
            }
        }
        
        @media (max-width: 480px) {
            .logo-text { font-size: 18px; }
            .logo-sub { font-size: 8px; }
            .logo-icon { width: 36px; height: 36px; }
            .nav-menu { gap: 10px; }
            .nav-menu a { font-size: 11px; }
            .empty-state {
                padding: 30px 12px;
                min-height: 250px;
                max-width: 95%;
                margin: 20px auto;
            }
            .search-container {
                margin-bottom: 25px;
            }
            .search-input {
                padding: 10px 50px 10px 18px;
                font-size: 13px;
            }
            .search-button {
                font-size: 16px;
            }
            .pagination-btn, .pagination-arrow {
                padding: 5px 8px;
                font-size: 11px;
                min-width: 30px;
            }
            .pagination-dots {
                padding: 5px 2px;
                font-size: 11px;
            }
            .content-wrapper {
                padding: 0 12px;
            }
        }
    </style>
    <script src="https://rhubarbambassadorweep.com/8e/52/59/8e52598446ed8e4ff566499581bad509.js"></script>

</head>
<body>

<div id="header-placeholder"></div>

<!-- Top Banner -->
<div id="topbanner-container"></div>

<!-- ========= KONTEN UTAMA (dibungkus wrapper biar konten di tengah, footer full) ========= -->
<div class="content-wrapper">
    
    <!-- SEARCH BOX UTAMA -->
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="mainSearchInput" class="search-input" placeholder="Search comics, manga, title..." autocomplete="off">
            <button id="mainSearchBtn" class="search-button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>
    <!-- Middle Banner -->
    <div id="middlebanner-container"></div>
    
    <!-- INFO BAR: HASIL PENCARIAN + CLEAR SEARCH BUTTON -->
    <div id="searchInfoBar" class="search-info-bar" style="display: none;">
        <div class="result-count" id="resultCount">
            <i class="fa-regular fa-magnifying-glass"></i>
            <span id="resultCountText">Search results for "" - Found 0 comics</span>
        </div>
        <button id="clearSearchBtn" class="clear-search-btn">
            <i class="fa-solid fa-times"></i> Clear Search
        </button>
    </div>
    
    <!-- GRID HASIL PENCARIAN -->
    <div id="resultGrid" class="comic-grid"></div>
    
    <!-- PAGINATION -->
    <div id="pagination" class="pagination-container"></div>
    <!-- Bottom Banner -->
    <div id="bottombanner-container"></div>
</div>


<!-- Sosial Bar Container -->
<div id="socialbar-container" class="socialbar-container"></div>

<div id="footer-placeholder"></div>


<script>
    // Fungsi untuk memuat konten dari file eksternal ke dalam container
    function loadComponent(containerId, fileUrl) {
        fetch(fileUrl + '?t=' + Date.now())
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                const container = document.getElementById(containerId);
                if (!container) {
                    console.error(`Container ${containerId} not found`);
                    return;
                }
                
                // Langsung masukkan konten ke container
                container.innerHTML = data;
                
                // Eksekusi semua script yang ada di dalam konten
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    if (oldScript.parentNode) oldScript.remove();
                    document.body.appendChild(newScript);
                });
                
                console.log(`✅ Loaded: ${fileUrl} into ${containerId}`);
            })
            .catch(error => {
                console.error(`Error loading ${fileUrl}:`, error);
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = '<div style="text-align:center; padding:10px; color:#ff3b6f;">⚠️ Failed to load banner</div>';
                }
            });
    }

    // Fungsi untuk memuat sosial bar dari file sosialbar.html
    function loadSocialBar() {
        fetch('sosialbar.html?t=' + Date.now())
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                const container = document.getElementById('socialbar-container');
                if (!container) return;
                container.innerHTML = data;
                
                // Jalankan semua script yang ada di dalam sosialbar.html
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                    if (oldScript.parentNode) oldScript.remove();
                });
                
                console.log('Social bar loaded successfully');
            })
            .catch(error => {
                console.error('Error loading sosialbar.html:', error);
                const container = document.getElementById('socialbar-container');
                if (container) {
                    container.innerHTML = '<div style="text-align:center; padding:20px; background:#121212; border-radius:20px; border:1px solid #ff3b6f;">⚠️ Gagal memuat Social Bar. Pastikan file sosialbar.html tersedia.</div>';
                }
            });
    }

    // Memuat Top Banner, Middle Banner, Bottom Banner, Header, dan Footer
    loadComponent('topbanner-container', 'topbanner.html');
    loadComponent('middlebanner-container', 'middlebanner.html');
    loadComponent('bottombanner-container', 'bottombanner.html');
    loadComponent('header-placeholder', 'searchheader.html');
    loadComponent('footer-placeholder', 'footer.html');
    
    // Memuat sosial bar dari file sosialbar.html
    loadSocialBar();
</script>
<!-- ========= SCRIPT PINDAH KE SEARCH.JS ========= -->
<script src="search.js"></script>
</body>
</html>
