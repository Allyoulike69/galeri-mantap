<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery Manga Center</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <style>
      body { background: #111; color: #fff; margin: 0; padding: 20px 10px; font-family: 'Segoe UI', Arial, sans-serif; overflow: auto; }
      body.item-view .Blog .post-title-container { display: none;}
      body.item-view .Blog .post-header-container { display: none; }
      body.item-view .PopularPosts { display: none; }
      .blog-name h1, .blog-name h1 a {font: italic 800 20px Open Sans, sans-serif;}

      /* HEADER SECTION STYLE */
      .container-header {
          border-bottom: 2px solid #ffa74e;
          margin: 20px 0;
          padding: 15px 0;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 12px;
      }
      .color-icon { color: #ff2d55; font-size: 24px; }
      .header-title { color: #eee; font-size: 22px; font-weight: bold; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); }

      #main-content { display: block; max-width: 1100px; margin: 0 auto; }

      /* GRID SYSTEM */
      .comic-grid {
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 10px;
          margin-bottom: 20px;
      }
      @media (max-width: 1024px) { .comic-grid { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 600px) { .comic-grid { grid-template-columns: repeat(2, 1fr); gap: 5px; } }

      .comic-item {
          background: #1a1a1a; border-radius: 8px; overflow: hidden;
          border: 1px solid #333; position: relative; transition: transform 0.2s;
      }
      .comic-item:hover { border-color: #ffa74e; transform: translateY(-5px); }
      .comic-thumb-container { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #222; }
      .comic-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
      .comic-title {
          padding: 8px 5px; font-size: 12px; font-weight: bold; color: #eee;
          text-decoration: none; display: block; text-align: center;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }

      /* BADGES */
      .badge {
          position: absolute; top: 5px; left: 5px;
          color: #fff; font-size: 10px; padding: 2px 7px;
          border-radius: 4px; font-weight: bold; z-index: 2;
      }
      .badge-new { background: #b80006; }
      .badge-pick { background: #ff2d55; display: none; }

      /* PAGINATION STYLE */
      .pagination-container {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 5px;
          margin: 30px 0 50px 0;
          flex-wrap: wrap;
      }
      .page-num {
          min-width: 35px;
          height: 35px;
          padding: 0 5px;
          background: transparent;
          border: none;
          color: #aaa;
          cursor: pointer;
          font-weight: bold;
          font-size: 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: 0.2s;
      }
      .page-num i { font-size: 12px; }
      .page-num.active {
          background: #333;
          color: #ffa74e;
          border-radius: 50%;
      }
      .page-num:hover:not(.active) {
          color: #fff;
      }
      .page-num.disabled {
          opacity: 0.3;
          cursor: not-allowed;
      }
      .page-dots { color: #aaa; padding: 0 5px; font-weight: bold; }
    </style>
  </head>
  <body>

    <div id="main-content">
      <header class="container-header">
        <i class="fa fa-fire color-icon"></i>
        <h1 class="header-title">Recommended</h1>
      </header>
      <div id="random-grid" class="comic-grid"></div>

      <header class="container-header" id="new-section">
        <i class="fa-solid fa-box-tissue color-icon"></i>
        <h1 class="header-title">New Uploads</h1>
      </header>
      <div id="new-uploads-grid" class="comic-grid"></div>
      
      <div id="pagination" class="pagination-container"></div>
    </div>

    <script>
      const blogUrl = "https://allyoulikecomic69.blogspot.com";
      const targetUrl = "https://allyoulikecomic69.blogspot.com/2026/04/home.html";
      const warningImg = "https://i.ibb.co.com/Ld6Kddv9/1-3.webp";
      
      let allEntries = []; 
      const itemsPerPage = 25; 

      // Langsung jalankan fungsi tampilkan konten tanpa cek localStorage
      document.addEventListener("DOMContentLoaded", function() {
          showContent();
          
          const searchForm = document.querySelector('form[action*="/search"]');
          if (searchForm) {
              searchForm.addEventListener('submit', function(e) {
                  e.preventDefault();
                  const q = this.querySelector('input[name="q"]').value;
                  window.location.href = "/2026/04/search.html?q=" + encodeURIComponent(q);
              });
          }
      });

      function showContent() {
          loadFeeds();
          applyMainHeaderLink();
      }

      function applyMainHeaderLink() {
          var mainHeader = document.querySelectorAll('.Header h1, .Header a, .titlewrapper h1, .header-inner h1');
          mainHeader.forEach(function(header) {
              header.onclick = function() { window.location.href = targetUrl; };
              header.style.cursor = "pointer";
              var originalText = header.innerText;
              header.innerHTML = `<a href="${targetUrl}" style="color:inherit; text-decoration:none;">${originalText}</a>`;
          });
      }

      function loadFeeds() {
          appendScript(`${blogUrl}/feeds/posts/default?alt=json-in-script&max-results=150&callback=processData`);
      }

      function appendScript(src) {
          var script = document.createElement('script');
          script.src = src;
          document.body.appendChild(script);
      }

      function getFirstImg(entry) {
          var content = (entry.content ? entry.content.$t : "") + (entry.summary ? entry.summary.$t : "");
          var imgRegex = /(https?:\/\/[^\s<"']+?\.(?:jpg|jpeg|gif|png|webp|bmp))/gi;
          let match;
          let foundImg = "";
          while ((match = imgRegex.exec(content)) !== null) {
              let currentImg = match[0].replace(/&amp;/g, "&");
              if (currentImg !== warningImg) {
                  foundImg = currentImg;
                  break;
              }
          }
          if (foundImg) return foundImg;
          if (entry.media$thumbnail) return entry.media$thumbnail.url.replace(/\/s[72]-c\//, "/s1600/");
          return "https://via.placeholder.com/300x400?text=No+Image";
      }

      window.processData = function(json) {
          if(!json.feed.entry) return;
          allEntries = json.feed.entry.filter(e => {
              const title = e.title.$t.toLowerCase().trim();
              const link = e.link.find(l => l.rel === 'alternate').href.toLowerCase();
              return !(title === "home" || title === "search" || link.includes("home.html") || link.includes("search.html"));
          });
          renderRecommended(allEntries);
          goToPage(1);
      };

      function goToPage(page) {
          const start = (page - 1) * itemsPerPage;
          const end = start + itemsPerPage;
          const paginatedData = allEntries.slice(start, end);

          renderGrid(paginatedData, 'new-uploads-grid', 'NEW', start);
          renderPaginationControls(page);

          if(page > 1) {
             document.getElementById('new-section').scrollIntoView({ behavior: 'smooth' });
          }
      }

      function renderPaginationControls(currentPage) {
          const container = document.getElementById('pagination');
          container.innerHTML = "";
          const totalPages = Math.ceil(allEntries.length / itemsPerPage);
          if (totalPages <= 1) return;

          container.appendChild(createPageBtn('<i class="fa-solid fa-angles-left"></i>', 1, currentPage === 1));
          container.appendChild(createPageBtn('<i class="fa-solid fa-angle-left"></i>', currentPage - 1, currentPage === 1));

          let startPage = Math.max(1, currentPage - 2);
          let endPage = Math.min(totalPages, currentPage + 2);

          if (startPage > 1) {
              container.appendChild(createPageBtn("1", 1, false, currentPage === 1));
              if (startPage > 2) {
                  const dots = document.createElement('span');
                  dots.className = "page-dots";
                  dots.innerText = "...";
                  container.appendChild(dots);
              }
          }

          for (let i = startPage; i <= endPage; i++) {
              container.appendChild(createPageBtn(i.toString(), i, false, i === currentPage));
          }

          if (endPage < totalPages) {
              if (endPage < totalPages - 1) {
                  const dots = document.createElement('span');
                  dots.className = "page-dots";
                  dots.innerText = "...";
                  container.appendChild(dots);
              }
              container.appendChild(createPageBtn(totalPages.toString(), totalPages, false, currentPage === totalPages));
          }

          container.appendChild(createPageBtn('<i class="fa-solid fa-angle-right"></i>', currentPage + 1, currentPage === totalPages));
          container.appendChild(createPageBtn('<i class="fa-solid fa-angles-right"></i>', totalPages, currentPage === totalPages));
      }

      function createPageBtn(text, targetPage, isDisabled, isActive = false) {
          const btn = document.createElement('button');
          btn.innerHTML = text;
          btn.className = `page-num ${isActive ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;
          if (!isDisabled) {
              btn.onclick = () => goToPage(targetPage);
          }
          return btn;
      }

      function renderRecommended(entries) {
          const now = new Date().getTime();
          const savedTime = localStorage.getItem('block_timer');
          let savedData = JSON.parse(localStorage.getItem('block_data'));
          if (!savedTime || (now - savedTime > 86400000) || !savedData) {
              const pool = entries.length > 10 ? entries.slice(5) : entries;
              savedData = pool.sort(() => 0.5 - Math.random()).slice(0, 5);
              localStorage.setItem('block_data', JSON.stringify(savedData));
              localStorage.setItem('block_timer', now);
          }
          renderGrid(savedData, 'random-grid', 'PICK', 0);
      }

      function renderGrid(data, gridId, type, startIndex) {
          const grid = document.getElementById(gridId);
          if(!grid) return;
          grid.innerHTML = "";
          data.forEach(function(entry, index) {
              var title = entry.title.$t;
              var link = entry.link.find(l => l.rel === 'alternate').href;
              var imgUrl = getFirstImg(entry);
              var badge = "";
              if (type === 'NEW' && (startIndex + index) < 5) {
                  badge = `<span class="badge badge-new">NEW</span>`;
              } else if (type === 'PICK') {
                  badge = `<span class="badge badge-pick">PICK</span>`;
              }
              grid.innerHTML += `
                <div class="comic-item">
                    ${badge}
                    <a href="${link}"><div class="comic-thumb-container"><img src="${imgUrl}" class="comic-thumb" loading="lazy"></div></a>
                    <a class="comic-title" href="${link}">${title}</a>
                </div>`;
          });
      }
    </script>
  </body>
</html>
