<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Allyoulike Comic - Gallery Comic Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        /* RESET & GLOBAL */
        * { box-sizing: border-box; }
        body {
            background: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* KONTEN UTAMA: dibatasi lebar maksimal + margin kiri/kanan untuk iklan */
        .main-content-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
            flex: 1;
        }

        /* FOOTER SEDERHANA */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid #222;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        .footer-text {
            color: #777;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        .footer-text i {
            color: #ff5e7c;
            margin: 0 2px;
        }
        .footer-text a {
            color: #ffa74e;
            text-decoration: none;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }

        /* GRID */
        .comic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        @media (min-width: 768px) {
            .comic-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        .container-header {
            border-bottom: 2px solid #ffa74e;
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .header-title {
            color: #eee;
            font-size: 22px;
            font-weight: bold;
            margin: 0;
        }
        .color-icon { color: #ff2d55; font-size: 24px; }
        
        .comic-item {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        .comic-item:hover {
            transform: translateY(-5px);
            border-color: #ffa74e;
        }
        .comic-thumb-container { aspect-ratio: 2/3; overflow: hidden; background: #222; }
        .comic-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        .comic-title {
            display: block;
            padding: 8px;
            text-align: center;
            color: #eee;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .comic-title:hover { color: #ffa74e; }
        
        .badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.8);
            padding: 3px 6px;
            font-size: 10px;
            border-radius: 4px;
            color: white;
        }
        .badge-new { background: #b80006; }
        
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .pagination-btn, .pagination-arrow {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        .pagination-btn.active { color: #ffa74e; font-weight: bold; }
        .pagination-arrow.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .pagination-dots { color: #888; padding: 8px 4px; font-size: 14px; }
        
        @media (max-width: 768px) {
            .main-content-container { padding: 0 16px; }
        }
        @media (max-width: 480px) {
            .main-content-container { padding: 0 12px; }
        }
        
        @media (min-width: 769px) {
            .main-content-container {
                max-width: 1280px;
                margin: 0 auto;
                padding: 0 20px;
            }
        }
        
        /* TEMPORARY HIDDEN UNTIL HEADER LOADS */
        #header-placeholder {
            width: 100%;
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<!-- Top Banner -->
<div id="topbanner-container"></div>


<div class="main-content-container">
    <header class="container-header" id="recommended-header">
        <i class="fa fa-fire color-icon"></i>
        <h1 class="header-title">Recommended</h1>
    </header>
    <div id="random-grid" class="comic-grid"></div>

    <div id="search-info-container"></div>
    
     <!-- Middle Banner -->
    <div id="middlebanner-container"></div>
    
    <header class="container-header" id="new-section">
        <i class="fa-solid fa-box-tissue color-icon"></i>
        <h1 class="header-title" id="new-uploads-title">New Uploads</h1>
    </header>
    <div id="new-uploads-grid" class="comic-grid"></div>
    
    <div id="pagination" class="pagination-container"></div>
    
    <!-- Bottom Banner -->
    <div id="bottombanner-container"></div>
</div>

<!-- Sosial Bar Container -->
<div id="socialbar-container" class="socialbar-container"></div>

<div id="footer-placeholder"></div>

<script>
    // Fungsi untuk memuat konten dari file eksternal ke dalam container
    function loadComponent(containerId, fileUrl) {
        fetch(fileUrl + '?t=' + Date.now())
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = data;
                
                // Jika yang dimuat adalah file banner, jalankan script iklan yang ada di dalamnya
                if (fileUrl === 'topbanner.html' || fileUrl === 'middlebanner.html' || fileUrl === 'bottombanner.html') {
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                        } else {
                            newScript.textContent = oldScript.textContent;
                        }
                        document.body.appendChild(newScript);
                        if (oldScript.parentNode) oldScript.remove();
                    });
                }
            })
            .catch(error => {
                console.error(`Error loading ${fileUrl}:`, error);
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = '<div style="text-align:center; padding:10px; color:#ff3b6f;">Failed to load banner. Please check network.</div>';
                }
            });
    }

    // Fungsi untuk memuat sosial bar dari file sosialbar.html
    function loadSocialBar() {
        fetch('sosialbar.html?t=' + Date.now())
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                const container = document.getElementById('socialbar-container');
                if (!container) return;
                container.innerHTML = data;
                
                // Jalankan semua script yang ada di dalam sosialbar.html
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                    if (oldScript.parentNode) oldScript.remove();
                });
                
                console.log('Social bar loaded successfully');
            })
            .catch(error => {
                console.error('Error loading sosialbar.html:', error);
                const container = document.getElementById('socialbar-container');
                if (container) {
                    container.innerHTML = '<div style="text-align:center; padding:20px; background:#121212; border-radius:20px; border:1px solid #ff3b6f;">⚠️ Gagal memuat Social Bar. Pastikan file sosialbar.html tersedia.</div>';
                }
            });
    }

    // Memuat Top Banner, Middle Banner, Bottom Banner, Header, dan Footer
    loadComponent('topbanner-container', 'topbanner.html');
    loadComponent('middlebanner-container', 'middlebanner.html');
    loadComponent('bottombanner-container', 'bottombanner.html');
    loadComponent('header-placeholder', 'header.html');
    loadComponent('footer-placeholder', 'footer.html');
    
    // Memuat sosial bar dari file sosialbar.html
    loadSocialBar();
</script>
<script src="script.js"></script>

</body>
</html>
