<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery Manga Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        /* --- GAYA (CSS) ANDA TETAP SAMA, DISINI DIPERSINGKAT --- */
        body { background: #111; color: #fff; margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .main-header { background: #0a0a0a; border-bottom: 3px solid #ffa74e; border-radius: 0 0 12px 12px; padding: 10px 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text { font-size: 24px; font-weight: bold; background: linear-gradient(135deg, #ffa74e, #ff5e7c); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { display: flex; gap: 25px; justify-content: center; padding: 15px 0 5px; flex-wrap: wrap; }
        .nav-menu a { color: #ddd; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .nav-menu a:hover { color: #ffa74e; }
        .search-panel-desktop, .mobile-search-container { display: flex; background: #222; border-radius: 40px; padding: 5px 15px; border: 1px solid #444; }
        .search-panel-desktop input, .mobile-search-container input { background: transparent; border: none; padding: 8px; color: white; outline: none; }
        .mobile-search-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; background: #0a0a0a; padding: 15px; z-index: 1000; }
        .container-header { border-bottom: 2px solid #ffa74e; margin: 30px 0 15px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .comic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        @media (min-width: 768px) { .comic-grid { grid-template-columns: repeat(5, 1fr); } }
        .comic-item { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: transform 0.2s; position: relative; }
        .comic-item:hover { transform: translateY(-5px); border-color: #ffa74e; }
        .comic-thumb-container { aspect-ratio: 2/3; overflow: hidden; }
        .comic-thumb { width: 100%; height: 100%; object-fit: cover; }
        .comic-title { display: block; padding: 8px; text-align: center; color: #eee; text-decoration: none; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge, .date-badge { position: absolute; background: rgba(0,0,0,0.8); padding: 3px 6px; font-size: 10px; border-radius: 4px; }
        .badge-new { background: #b80006; top: 5px; left: 5px; color: white; }
        .badge-pick { background: #ff2d55; top: 5px; left: 5px; color: white; }
        .date-badge { bottom: 5px; right: 5px; color: #ffa74e; }
        .pagination-container { display: flex; justify-content: center; gap: 8px; margin: 30px 0; flex-wrap: wrap; }
        .page-num { background: #222; border: none; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .page-num.active { background: #ffa74e; color: #111; }
        @media (max-width: 768px) { .search-icon-mobile { display: block; } .desktop-search-wrapper { display: none; } }
        @media (min-width: 769px) { .search-icon-mobile { display: none; } .desktop-search-wrapper { display: block; } }
    </style>
</head>
<body>

<div class="main-header">
    <div class="top-bar">
        <div class="logo-area" id="logoClick">
            <i class="fa-solid fa-book-open" style="font-size: 28px; color:#ffa74e;"></i>
            <div><div class="logo-text">MANGAVERSE</div><div style="font-size:10px; color:#aaa;">Gallery Manga Center</div></div>
        </div>
        <button class="search-icon-mobile" id="searchIconMobile"><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="desktop-search-wrapper">
            <div class="search-panel-desktop">
                <input type="text" id="searchInputDesktop" placeholder="Cari manga...">
                <button id="searchBtnDesktop"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </div>
    <div class="nav-menu">
        <a href="#" id="navHome"><i class="fa-solid fa-house"></i> Beranda</a>
        <a href="#" id="navNew"><i class="fa-solid fa-fire"></i> New Uploads</a>
        <a href="#" id="navRecommended"><i class="fa-solid fa-star"></i> Rekomendasi</a>
    </div>
</div>

<div class="mobile-search-overlay" id="mobileSearchOverlay">
    <div class="mobile-search-container">
        <input type="text" id="searchInputMobile" placeholder="Cari manga...">
        <button id="searchBtnMobile"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button id="closeSearchBtn"><i class="fa-solid fa-times"></i></button>
    </div>
</div>

<div id="main-content">
    <header class="container-header"><i class="fa fa-fire" style="color:#ff2d55;"></i><h1 class="header-title">Recommended</h1></header>
    <div id="random-grid" class="comic-grid"></div>

    <header class="container-header"><i class="fa-solid fa-box-tissue" style="color:#ff2d55;"></i><h1 class="header-title">New Uploads</h1></header>
    <div id="new-uploads-grid" class="comic-grid"></div>
    <div id="pagination" class="pagination-container"></div>
</div>

<script>
    // ========= KONFIGURASI DENGAN URL ABSOLUT =========
    const DATA_URL = "https://allyoulike69.github.io/galeri-mantap/daftar.json";
    const BASE_URL = "https://allyoulike69.github.io/galeri-mantap/";
    
    let allPages = [], filteredPages = [];
    let isSearchMode = false, currentPageNum = 1;
    const itemsPerPage = 25;

    async function loadData() {
        try {
            document.getElementById('random-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center;">⏳ Memuat data...</div>';
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            allPages = data.pages || [];
            // Urutkan dari terbaru ke terlama
            allPages.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            if (!allPages.length) throw new Error("Data kosong");
            
            // Recommended (5 random)
            let shuffled = [...allPages];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            renderGrid(shuffled.slice(0,5), 'random-grid', true);
            goToPage(1);
        } catch (err) {
            document.getElementById('random-grid').innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ff8888;">❌ Gagal memuat data: ${err.message}<br>Pastikan file daftar.json benar-benar ada di:<br>${DATA_URL}</div>`;
            document.getElementById('new-uploads-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center;">Gagal memuat data.</div>';
        }
    }

    function renderGrid(data, gridId, isRecommended = false) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = "";
        if (!data.length) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">📭 Tidak ada konten.</div>'; return; }
        
        data.forEach((item, idx) => {
            let link = item.link.startsWith('http') ? item.link : BASE_URL + item.link;
            let imgUrl = item.image || "https://placehold.co/400x600?text=No+Image";
            let badge = isRecommended ? '<span class="badge badge-pick">PICK</span>' : (idx < 5 ? '<span class="badge badge-new">NEW</span>' : '');
            let dateHtml = item.date ? `<span class="date-badge"><i class="fa-regular fa-calendar"></i> ${new Date(item.date).toLocaleDateString('id-ID')}</span>` : '';
            grid.innerHTML += `
                <div class="comic-item">
                    ${badge}${dateHtml}
                    <a href="${link}"><div class="comic-thumb-container"><img src="${imgUrl}" class="comic-thumb" loading="lazy" onerror="this.src='https://placehold.co/400x600?text=Error'"></div></a>
                    <a class="comic-title" href="${link}">${escapeHtml(item.title)}</a>
                </div>`;
        });
    }

    function goToPage(page) {
        if (isSearchMode) return;
        currentPageNum = page;
        const start = (page-1) * itemsPerPage;
        renderGrid(allPages.slice(start, start+itemsPerPage), 'new-uploads-grid', false);
        renderPagination(page);
        if(page>1) document.getElementById('new-section')?.scrollIntoView({ behavior: 'smooth' });
    }

    function renderPagination(currentPage) {
        const container = document.getElementById('pagination');
        container.innerHTML = "";
        const totalPages = Math.ceil(allPages.length / itemsPerPage);
        if(totalPages <= 1) return;
        for(let i=1; i<=totalPages; i++) {
            if(i===1 || i===totalPages || (i>=currentPage-2 && i<=currentPage+2)) {
                let btn = document.createElement('button');
                btn.innerText = i; btn.className = `page-num ${i===currentPage ? 'active' : ''}`;
                btn.onclick = () => goToPage(i);
                container.appendChild(btn);
            } else if (i === currentPage-3 || i === currentPage+3) {
                let span = document.createElement('span'); span.innerText = '...'; span.style.color = '#aaa';
                container.appendChild(span);
            }
        }
    }

    function performSearch(query) {
        if(!query.trim()) { resetToHome(); return; }
        isSearchMode = true;
        filteredPages = allPages.filter(p => p.title.toLowerCase().includes(query.toLowerCase()));
        document.getElementById('random-grid').style.display = 'none';
        document.querySelector('#main-content .container-header:first-of-type').style.display = 'none';
        document.querySelector('#new-section .header-title').innerText = `Hasil Cari: ${query} (${filteredPages.length})`;
        
        if(filteredPages.length) renderGrid(filteredPages.slice(0, itemsPerPage), 'new-uploads-grid', false);
        else document.getElementById('new-uploads-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center;">🔍 Tidak ditemukan</div>';
        document.getElementById('pagination').innerHTML = "";
        document.getElementById('new-section').scrollIntoView({ behavior: 'smooth' });
    }

    function resetToHome() {
        isSearchMode = false;
        document.getElementById('random-grid').style.display = 'grid';
        document.querySelector('#main-content .container-header:first-of-type').style.display = 'flex';
        document.querySelector('#new-section .header-title').innerText = "New Uploads";
        let shuffled = [...allPages];
        for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        renderGrid(shuffled.slice(0,5), 'random-grid', true);
        goToPage(1);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Event Listeners
    document.addEventListener("DOMContentLoaded", () => {
        loadData();
        document.getElementById('searchBtnDesktop').onclick = () => performSearch(document.getElementById('searchInputDesktop').value);
        document.getElementById('searchInputDesktop').onkeypress = (e) => { if(e.key === 'Enter') performSearch(e.target.value); };
        document.getElementById('searchIconMobile').onclick = () => document.getElementById('mobileSearchOverlay').style.display = 'flex';
        document.getElementById('closeSearchBtn').onclick = () => document.getElementById('mobileSearchOverlay').style.display = 'none';
        document.getElementById('searchBtnMobile').onclick = () => { performSearch(document.getElementById('searchInputMobile').value); document.getElementById('mobileSearchOverlay').style.display = 'none'; };
        document.getElementById('searchInputMobile').onkeypress = (e) => { if(e.key === 'Enter') { performSearch(e.target.value); document.getElementById('mobileSearchOverlay').style.display = 'none'; } };
        document.getElementById('navHome').onclick = (e) => { e.preventDefault(); resetToHome(); };
        document.getElementById('navNew').onclick = (e) => { e.preventDefault(); resetToHome(); document.getElementById('new-section').scrollIntoView({ behavior: 'smooth' }); };
        document.getElementById('navRecommended').onclick = (e) => { e.preventDefault(); document.getElementById('random-grid').scrollIntoView({ behavior: 'smooth' }); };
        document.getElementById('logoClick').onclick = () => resetToHome();
    });
</script>
</body>
</html>
